<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="index.Css">
</head>
<body>
    <header class="site-header">
        <h1 class="site-title">Doctor Registration</h1>
        <nav class="main-nav" id="nav" aria-label="Main navigation">
            <a href="index.html" target="_blank">Home</a>
            <a href="about.html" target="_blank">About</a>
            <a href="contact.html" target="_blank">Contact</a>
            <a href="DoctorRegister.html" target="_blank">Doc Register</a>
            <a href="DoctorLogin.html" target="_blank">Doc Login</a>
            <a href="PatientRegister.html" target="_blank">Patient Register</a>
            <a href="PatientLogin.html" target="_blank">Patient Login</a>
            <a href="DoctorServices.html" target="_blank">Doctor Services</a>
        </nav>
    </header>

    <main class="page">
        <section class="panel form-card">
            <h2>Doctor Registration</h2>
            <form action="doctor-register" method="post" name="doctorRegistrationForm" enctype="multipart/form-data" class="form-grid" data-validate="doctor-register">
                <div class="form-row">
                    <label for="nm">Name</label>
                    <input type="text" name="name" id="nm" required autocomplete="name">
                    <span class="error-message"></span>
                </div>
                <div class="form-row">
                    <label for="pwd">Password</label>
                    <input type="password" name="password" id="pwd" required minlength="6" autocomplete="new-password">
                    <span class="error-message"></span>
                </div>
                <div class="form-row">
                    <label for="eml">Email</label>
                    <input type="email" name="email" id="eml" required autocomplete="email">
                    <span class="error-message"></span>
                </div>
                <div class="form-row">
                    <label for="phn">Phone Number</label>
                    <input type="tel" name="phone" id="phn" required pattern="[0-9]{10}" maxlength="10" autocomplete="tel">
                    <span class="error-message"></span>
                </div>
                <div class="form-row">
                    <label for="spec">Specialization</label>
                    <select name="specialization" id="spec" required>
                        <option value="">Select specialization</option>
                        <option value="cardiology">Cardiology</option>
                        <option value="dermatology">Dermatology</option>
                        <option value="neurology">Neurology</option>
                        <option value="pediatrics">Pediatrics</option>
                        <option value="psychiatry">Psychiatry</option>
                        <option value="radiology">Radiology</option>
                    </select>
                    <span class="error-message"></span>
                </div>
                <div class="form-row">
                    <label for="exp">Years of Experience</label>
                    <input type="number" name="experience" min="0" max="50" id="exp" required>
                    <span class="error-message"></span>
                </div>
                <div class="form-row">
                    <span class="field-label">Gender</span>
                    <div class="choice-group">
                        <label for="male"><input type="radio" name="gender" value="male" id="male" required> Male</label>
                        <label for="female"><input type="radio" name="gender" value="female" id="female"> Female</label>
                    </div>
                    <span class="error-message"></span>
                </div>
                <div class="form-row">
                    <span class="field-label">Available Days</span>
                    <div class="choice-group">
                        <label for="mon"><input type="checkbox" name="days" value="monday" id="mon"> Monday</label>
                        <label for="tue"><input type="checkbox" name="days" value="tuesday" id="tue"> Tuesday</label>
                        <label for="wed"><input type="checkbox" name="days" value="wednesday" id="wed"> Wednesday</label>
                        <label for="thu"><input type="checkbox" name="days" value="thursday" id="thu"> Thursday</label>
                        <label for="fri"><input type="checkbox" name="days" value="friday" id="fri"> Friday</label>
                    </div>
                    <span class="error-message"></span>
                </div>
                <div class="form-row">
                    <label for="time">Available Time</label>
                    <input type="time" name="time" id="time" required>
                    <span class="error-message"></span>
                </div>
                <div class="form-row">
                    <label for="addr">Address</label>
                    <textarea name="address" rows="5" id="addr" required></textarea>
                    <span class="error-message"></span>
                </div>
                <div class="form-row">
                    <label for="cert">Upload Certificate</label>
                    <input type="file" name="certificate" id="cert" required>
                    <span class="error-message"></span>
                </div>
                <div class="actions">
                    <button type="submit" value="Register" id="reg" class="btn btn-success">Register</button>
                    <button type="reset" value="Reset" id="res" class="btn btn-danger">Reset</button>
                </div>
            </form>
        </section>
    </main>

    <footer class="site-footer">
        <h2>Thank you for registering!</h2>
    </footer>
    <script src="validation.js"></script>
</body>
</html>
