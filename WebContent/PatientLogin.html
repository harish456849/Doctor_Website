    <tr>
        <td>
        <lable for="email">Email</lable>
        </td>
        <td>
            <input type="email" name="email" id="email" class="input-group" required>
        </td>
    </tr>
    <tr>
        <td>
            <lable for="password">Password</lable>
        </td>
        <td>
            <input type="password" name="password" id="password" class="input-group" required>
        </td>
    </tr>
    <tr>
        <td colspan="2">
        <input type="checkbox" name="remember" id="remember" class="input-group">
        <lable for="remember">Remember Me</lable>
        </td>
    </tr>
       

    <tr >
        <td colspan="2">
            <button type="submit" value="Login" class="btn btn-success" >Login</button>
        </td>
    </tr>
