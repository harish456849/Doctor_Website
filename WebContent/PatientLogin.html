<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="index.Css">
</head>
<body>
    <header class="site-header">
        <h1 class="site-title">Patient Login</h1>
        <nav class="main-nav" id="nav" aria-label="Main navigation">
            <a href="index.html" target="_blank">Home</a>
            <a href="about.html" target="_blank">About</a>
            <a href="contact.html" target="_blank">Contact</a>
            <a href="DoctorRegister.html" target="_blank">Doc Register</a>
            <a href="DoctorLogin.html" target="_blank">Doc Login</a>
            <a href="PatientRegister.html" target="_blank">Patient Register</a>
            <a href="PatientLogin.html" target="_blank">Patient Login</a>
            <a href="DoctorServices.html" target="_blank">Doctor Services</a>
        </nav>
    </header>

    <main class="page">
        <section class="panel form-card">
            <h2>Patient Login</h2>
            <form class="form-grid" action="patient-login" method="post" data-validate="patient-login">
                <div class="form-row">
                    <label for="email">Email</label>
                    <input type="email" name="email" id="email" required autocomplete="email">
                    <span class="error-message"></span>
                </div>
                <div class="form-row">
                    <label for="password">Password</label>
                    <input type="password" name="password" id="password" required minlength="6" autocomplete="current-password">
                    <span class="error-message"></span>
                </div>
                <label class="check-row" for="remember">
                    <input type="checkbox" name="remember" id="remember"> Remember Me
                </label>
                <div class="actions">
                    <button type="submit" value="Login" class="btn btn-success">Login</button>
                </div>
            </form>
        </section>
    </main>

    <footer class="site-footer">
        <h2>Thank you for visiting!</h2>
    </footer>
    <script src="validation.js"></script>
</body>
</html>
