<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="index.Css">
</head>
<body>
    <header class="site-header">
        <h1 class="site-title">Contact Us</h1>
        <nav class="main-nav" id="nav" aria-label="Main navigation">
            <a href="index.html" target="_blank">Home</a>
            <a href="about.html" target="_blank">About</a>
            <a href="contact.html" target="_blank">Contact</a>
            <a href="DoctorRegister.html" target="_blank">Doc Register</a>
            <a href="DoctorLogin.html" target="_blank">Doc Login</a>
            <a href="PatientRegister.html" target="_blank">Patient Register</a>
            <a href="PatientLogin.html" target="_blank">Patient Login</a>
        </nav>
    </header>

    <main class="page">
        <section class="panel form-card">
            <h2>Contact Us</h2>
            <p class="lead">If you have any questions, fill out the form below or email us at contact@mywebsite.com.</p>
            <form class="form-grid" data-validate="contact">
                <div class="form-row">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required>
                    <span class="error-message"></span>
                </div>
                <div class="form-row">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                    <span class="error-message"></span>
                </div>
                <div class="form-row">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" required></textarea>
                    <span class="error-message"></span>
                </div>
                <div class="actions">
                    <button type="submit" class="btn btn-success">Submit</button>
                    <button type="reset" class="btn btn-danger">Reset</button>
                </div>
            </form>
        </section>
    </main>

    <footer class="site-footer">
        <h2>Thank you for visiting!</h2>
    </footer>
    <script src="validation.js"></script>
</body>
</html>
