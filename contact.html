<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
       <center><font color="red"><h1>Contact Us</h1></font> </center>
       <nav align="right">
           <ul>
               <a href="index.html">Home</a> |
               <a href="about.html">About</a> |
               <a href="contact.html">Contact</a>
           </ul>
    </header>
    <hr>
    <main>
        <div>
            <center><h2>Contact Us</h2></center>
            <p>If you have any questions or would like to get in touch with us, please fill out the form below or email us at contact@mywebsite.com.</p>
            <form>
                <label for="name">Name:</label>
                <input type="text" id="name" name="name"><br><br>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email"><br><br>
                <label for="message">Message:</label><br>
                <textarea id="message" name="message"></textarea><br><br>
                <input type="submit" value="Submit">
            </form>
        </div>
    </main>
    <hr>
    <footer>
      <center><font color="blue"><h2>Thank you for visiting!</h2></font></center>
    </footer>

</body>
</html>
